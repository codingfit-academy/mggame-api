# ─────────────────────────────────────────────────────────────
# .github/workflows/deploy.yml  —  API (FastAPI) CD
# front-next/deploy.yml, api-node/deploy.yml과 구조 동일
# health check URL: https://api.<student>.codingfit.kr/health
# ─────────────────────────────────────────────────────────────
name: Deploy to Production

on:
  workflow_run:
    workflows: ["Build & Push"]
    types: [completed]
    branches: [main]

  workflow_dispatch:
    inputs:
      image_tag:
        description: "배포할 이미지 태그"
        required: false
        default: "candidate"
        type: string
      reason:
        description: "배포 사유"
        required: false
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  ORG: codingfit-academy
  DOMAIN: codingfit.kr

jobs:
  gate:
    name: Check Build
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - id: check
        run: echo "proceed=true" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy FastAPI (선생님 승인 필요)
    runs-on: ubuntu-latest
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    environment: production

    steps:
      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=candidate" >> $GITHUB_OUTPUT
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote image tags
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.ORG }}/${{ vars.STUDENT_NAME }}-api"
          TAG="${{ steps.tag.outputs.tag }}"
          if docker buildx imagetools inspect "${IMAGE}:stable" >/dev/null 2>&1; then
            docker buildx imagetools create --tag "${IMAGE}:previous" "${IMAGE}:stable"
          fi
          docker buildx imagetools create --tag "${IMAGE}:stable" "${IMAGE}:${TAG}"
          echo "- \`${TAG}\` → \`stable\` ✅" >> $GITHUB_STEP_SUMMARY

      - name: Deploy via SSH
        id: deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_SSH_HOST }}
          username: ${{ secrets.SERVER_SSH_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ vars.SERVER_SSH_PORT || 22 }}
          timeout: 180s
          command_timeout: 150s
          script: |
            export GHCR_TOKEN="${{ secrets.GHCR_DEPLOY_TOKEN }}"
            export IS_EDGE_NODE=true
            /srv/academy/scripts/deploy_from_image.sh \
              "${{ vars.STUDENT_NAME }}" \
              "api" \
              "stable"

      - name: External health check
        id: health
        continue-on-error: true
        run: |
          URL="https://api.${{ vars.STUDENT_NAME }}.${{ env.DOMAIN }}/health"
          MAX=12; WAIT=10; ATTEMPT=0
          echo "Health check (FastAPI): $URL" | tee -a $GITHUB_STEP_SUMMARY
          while [ $ATTEMPT -lt $MAX ]; do
            ATTEMPT=$((ATTEMPT + 1))
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 15 --connect-timeout 10 "$URL" 2>/dev/null || echo "000")
            if [ "$HTTP" = "200" ]; then
              echo "✅ HTTP $HTTP (시도 $ATTEMPT)" | tee -a $GITHUB_STEP_SUMMARY
              exit 0
            fi
            echo "시도 $ATTEMPT/${MAX}: HTTP $HTTP"; sleep $WAIT
          done
          echo "❌ FastAPI Health check 실패" | tee -a $GITHUB_STEP_SUMMARY; exit 1

      - name: Auto rollback — server
        if: steps.health.outcome == 'failure'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_SSH_HOST }}
          username: ${{ secrets.SERVER_SSH_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            export IS_EDGE_NODE=true
            /srv/academy/scripts/rollback_student.sh "${{ vars.STUDENT_NAME }}" "api"

      - name: Auto rollback — restore GHCR stable
        if: steps.health.outcome == 'failure'
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.ORG }}/${{ vars.STUDENT_NAME }}-api"
          docker buildx imagetools create --tag "${IMAGE}:stable" "${IMAGE}:previous" 2>/dev/null || true

      - name: Fail after rollback
        if: steps.health.outcome == 'failure'
        run: exit 1

      - name: Success summary
        if: steps.health.outcome == 'success'
        run: |
          {
            echo "## ✅ FastAPI 배포 성공"
            echo "| 항목 | 값 |"
            echo "|---|---|"
            echo "| Student | \`${{ vars.STUDENT_NAME }}\` |"
            echo "| Service | api (FastAPI) |"
            echo "| URL | https://api.${{ vars.STUDENT_NAME }}.${{ env.DOMAIN }}/health |"
            echo "| 배포 시각 | $(date -u +%Y-%m-%dT%H:%M:%SZ) |"
            echo "| 배포자 | @${{ github.actor }} |"
          } >> $GITHUB_STEP_SUMMARY
